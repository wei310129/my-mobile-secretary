# Phase 0 本機基礎設施:PostgreSQL(含 PostGIS)+ Redis
# 啟動:docker compose up -d
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: mms-postgres
    environment:
      POSTGRES_DB: mymobilesecretary
      POSTGRES_USER: mms
      POSTGRES_PASSWORD: mms-local-dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mms -d mymobilesecretary"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
