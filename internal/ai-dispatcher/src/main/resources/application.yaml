spring:
  application:
    name: ai-dispatcher
  datasource:
    url: ${AI_DISPATCHER_DB_URL:jdbc:postgresql://localhost:5433/ai_dispatcher}
    username: ${AI_DISPATCHER_DB_USERNAME:ai_dispatcher}
    password: ${AI_DISPATCHER_DB_PASSWORD:ai-dispatcher-local-dev}
  flyway:
    enabled: true

server:
  port: ${AI_DISPATCHER_PORT:8091}

management:
  endpoints:
    web:
      exposure:
        include: health,info

ai-dispatcher:
  enabled: ${AI_DISPATCHER_ENABLED:false}
  poll-interval: ${AI_DISPATCHER_POLL_INTERVAL:1s}
  quiet-period: ${AI_DISPATCHER_QUIET_PERIOD:5m}
  maximum-wait: ${AI_DISPATCHER_MAXIMUM_WAIT:30m}
  codex:
    heartbeat-timeout: ${AI_DISPATCHER_CODEX_HEARTBEAT_TIMEOUT:2m}
    retry-delay: ${AI_DISPATCHER_CODEX_RETRY_DELAY:5m}
    max-recovery-attempts: ${AI_DISPATCHER_CODEX_MAX_RECOVERY_ATTEMPTS:3}
  codex-cli:
    enabled: ${AI_DISPATCHER_CODEX_CLI_ENABLED:false}
    executable: ${AI_DISPATCHER_CODEX_CLI_EXECUTABLE:}
    repository: ${AI_DISPATCHER_CODEX_REPOSITORY:}
    heartbeat-interval: ${AI_DISPATCHER_CODEX_CLI_HEARTBEAT_INTERVAL:30s}
    no-progress-timeout: ${AI_DISPATCHER_CODEX_CLI_NO_PROGRESS_TIMEOUT:15m}
    maximum-runtime: ${AI_DISPATCHER_CODEX_CLI_MAXIMUM_RUNTIME:2h}
    maximum-json-line-length: ${AI_DISPATCHER_CODEX_CLI_MAXIMUM_JSON_LINE_LENGTH:1048576}
    maximum-stderr-characters: ${AI_DISPATCHER_CODEX_CLI_MAXIMUM_STDERR_CHARACTERS:16384}
    maximum-prompt-characters: ${AI_DISPATCHER_CODEX_CLI_MAXIMUM_PROMPT_CHARACTERS:1048576}
  trigger-polling:
    page-size: ${AI_DISPATCHER_TRIGGER_PAGE_SIZE:100}
    max-pages-per-poll: ${AI_DISPATCHER_TRIGGER_MAX_PAGES:10}
  main-feed:
    enabled: ${AI_DISPATCHER_MAIN_FEED_ENABLED:false}
    base-url: ${AI_DISPATCHER_MAIN_FEED_BASE_URL:http://localhost:8080}
    bearer-token: ${AI_DISPATCHER_MAIN_FEED_TOKEN:}
    connect-timeout: ${AI_DISPATCHER_MAIN_FEED_CONNECT_TIMEOUT:2s}
    read-timeout: ${AI_DISPATCHER_MAIN_FEED_READ_TIMEOUT:5s}
  session-binding-api:
    enabled: ${AI_DISPATCHER_SESSION_BINDING_API_ENABLED:false}
    admin-token: ${AI_DISPATCHER_SESSION_BINDING_ADMIN_TOKEN:}
  retention:
    consumed-payload-retention: ${AI_DISPATCHER_CONSUMED_PAYLOAD_RETENTION:90d}
    sweep-interval: ${AI_DISPATCHER_RETENTION_SWEEP_INTERVAL:1h}
