# 測試環境:資料庫與 Redis 連線由 Testcontainers @ServiceConnection 動態注入,
# 這裡不寫死連線資訊,只放測試專屬的行為設定。
app:
  scheduling:
    # 測試不跑背景輪詢:worker 由測試直接呼叫,確保時序可控
    enabled: false
  integration:
    tdx:
      # 測試絕不打真實 TDX:交通估算直接用直線粗估
      enabled: false
    line:
      # 測試用假的 channel secret,自己算簽章驗證邏輯本身(不打真實 LINE API)
      enabled: true
      channel-secret: test-channel-secret
      channel-access-token: test-access-token
  weather:
    # 測試不打真實氣象署:提醒不附天氣建議
    enabled: false
  intent:
    # 測試不打真實 LLM:改用 TestcontainersConfiguration 裡的 stub 解析器
    enabled: false
  pending:
    prompt:
      # 測試時窗全開,不受執行時刻影響
      start: "00:00"
      end: "23:59"

spring:
  jpa:
    properties:
      hibernate:
        # 測試失敗時方便看實際 SQL
        format_sql: true
