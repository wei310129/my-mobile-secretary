# 共用設定;環境差異放各 profile 檔(local/test/prod)
spring:
  application:
    name: my-mobile-secretary
  config:
    # 機密(API 金鑰)放專案根目錄的 secrets.yaml,已 gitignore;沒有該檔也能啟動
    import: optional:file:./secrets.yaml
  ai:
    anthropic:
      # 真金鑰放 secrets.yaml;沒設時 intent 會安全降級，查詢不異動資料，明確「提醒／記下」才建保底待辦
      api-key: not-configured
      chat:
        options:
          model: claude-sonnet-5
          # 意圖/收據 schema 已隨能力擴充變大(options 25 欄、批次多指令 JSON);
          # 1024 曾在正式環境觸發空回應(BeanOutputConverter 收到 0 長度內容而炸開),
          # 調高以留足輸出空間；LLM 失敗仍會安全降級，這裡只是降低發生機率
          max-tokens: 4096
  # 不設定預設 profile；本機開發需明確啟用 local，部署漏設時維持下方安全預設。
  threads:
    virtual:
      # Java 21 虛擬執行緒:規劃引擎平行呼叫外部 API 的基礎
      enabled: true
  jpa:
    # schema 一律由 Flyway 管,Hibernate 只驗證不改表
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  workspace:
    # Production must never silently fall back to another tenant.
    legacy-fallback-enabled: false
  security:
    # Production must authenticate every REST endpoint. Local/test explicitly opt out below;
    # a production deployment without JWT configuration therefore fails closed at startup.
    enabled: true
    workspace-context:
      actor-claim: app_user_id
      workspace-claim: workspace_id
      workspace-header: X-Workspace-Id
    audit:
      retention: 365d
    idempotency:
      retention: 24h
  scheduling:
    # 背景排程(延遲提醒佇列輪詢);測試環境關閉改為直接呼叫
    enabled: true
  reminder:
    # 同一任務兩次提醒的最小間隔(同地點重複進出不重複轟炸)
    debounce-window: 10m
    # 提醒後未確認,多久後升級催促
    escalation-interval: 15m
    # 最多催促次數,之後不再輪
    max-escalations: 3
    # 延遲佇列輪詢間隔
    poll-interval: 5s
    queue:
      lease: 2m
      retry-delay: 30s
      max-failures: 5
      max-batch: 100
  notification:
    outbox:
      poll-interval: 5s
      lease: 2m
      retry-delay: 30s
      max-attempts: 5
      max-batch: 100
    windows-toast:
      # 預設關閉;只在本機開發(local profile)打開
      enabled: false
  knowledge:
    # 品項自動綁定時建立的 geofence 半徑
    auto-bind-radius-meters: 200
  travel:
    # 未特別說明時，單程達此時間才把一般外出視為「出遊」而非住家附近日常休閒
    outing-threshold-minutes: 35
    # 圖片擷取後等待使用者確認的期限；只存結構化文字，不保存原始圖片
    itinerary-draft-retention: 30d
  intent:
    # LLM 意圖理解；關閉時 /api/intent 走安全降級，只有明確「提醒／記下」才建保底待辦
    enabled: true
    capability-routing:
      # 先只比較候選路由與舊路由，不改變實際執行；累積 trace 後再按 domain 開 ACTIVE。
      mode: SHADOW
      max-candidates: 8
      legacy-prompt-characters: 14500
      estimated-characters-per-token: 2.0
    trace:
      # 正式環境必填 Base64 AES key；本機/測試未填時完全不保存 raw AI I/O。
      encryption-key: ${INTENT_TRACE_ENCRYPTION_KEY:}
      encryption-key-id: ${INTENT_TRACE_ENCRYPTION_KEY_ID:intent-trace-v1}
      raw-retention: 168h
      summary-retention: 2160h
  receipt:
    # 收據照片解析(Claude 多模態);關閉時圖片訊息回覆請改用文字
    enabled: true
  integration:
    development-feed:
      # Disabled by default. Enable only with a dedicated token bound to one actor/workspace.
      enabled: ${DEVELOPMENT_FEED_ENABLED:false}
      bearer-token: ${DEVELOPMENT_FEED_TOKEN:}
      workspace-id: ${DEVELOPMENT_FEED_WORKSPACE_ID:00000000-0000-0000-0000-000000000000}
      actor-id: ${DEVELOPMENT_FEED_ACTOR_ID:00000000-0000-0000-0000-000000000000}
      max-page-size: ${DEVELOPMENT_FEED_MAX_PAGE_SIZE:1000}
    google-places:
      # 建地點的資訊補全(計費服務,按次計);api-key 放 secrets.yaml,沒設就要求自帶座標
      enabled: true
    line:
      # 真憑證放 secrets.yaml;未設定時 webhook 直接吞掉請求(見 LineWebhookController)
      enabled: true
      message-history:
        retention: 90d
  feasibility:
    # 直線距離換算交通時間的假設速度(km/h);保守取低,寧可誤報要求確認
    assumed-speed-kmh: 25
    # 每段移動的固定緩衝(出門、停車、等車)
    transfer-buffer: 10m
  weather:
    # 提醒訊息附天氣建議
    enabled: true
    county: 新北市
    rain-probability-threshold: 60
    high-temp-threshold: 34
    alert:
      # 主動提醒時窗(帶傘提醒的「出門前」近似;晚上不吵人)
      start: "07:00"
      end: "21:00"
      # 降雨機率高於此值 → 大雨風險,主動問要不要調整行程
      heavy-rain-threshold: 80
      # 大雨警示只看這段時間內開始的已確認行程
      schedule-lookahead: 6h
      poll-interval: 30m
  suggestion:
    # 「待會」= 未來 3 小時(使用者拍板);此範圍內找順路可做的待辦
    window: 3h
    # 幾公尺內的任務地點才算順路
    max-distance-meters: 2000
    # 最多建議幾件
    limit: 5
  buffer:
    # 緩衝規則:同地點累積幾筆行程結果後才開始建議緩衝
    min-samples: 3
    # 建議緩衝上限(避免單次極端超時擴散)
    max-buffer: 2h
  follow-up:
    # 行程結果追蹤詢問(數值為使用者拍板;變更前先問使用者)
    # 行程結束後多久發詢問
    after-end: 15m
    # GPS 離開行程地點後多久發詢問(與 after-end 先到先發)
    after-exit: 5m
    # 一天最多幾則追蹤詢問(台北時間換日重算)
    daily-limit: 50
    # 只追蹤這段時間內結束的行程(避免部署後舊行程湧入詢問)
    lookback: 24h
    # GPS 離開點多近才算「該行程的地點」
    exit-radius-meters: 200
    poll-interval: 1m
  pending:
    prompt:
      # 空閒定義:未來 1 小時沒有已確認行程
      idle-window: 1h
      # 最少隔 4 小時才再問一次
      min-interval: 4h
      # 只在白天詢問(台北時間)
      start: "08:00"
      end: "21:00"
      poll-interval: 10m
