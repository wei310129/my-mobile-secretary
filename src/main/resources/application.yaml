# 共用設定;環境差異放各 profile 檔(local/test/prod)
spring:
  application:
    name: my-mobile-secretary
  profiles:
    # 沒指定 profile 時預設當本機開發
    default: local
  threads:
    virtual:
      # Java 21 虛擬執行緒:規劃引擎平行呼叫外部 API 的基礎
      enabled: true
  jpa:
    # schema 一律由 Flyway 管,Hibernate 只驗證不改表
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  scheduling:
    # 背景排程(延遲提醒佇列輪詢);測試環境關閉改為直接呼叫
    enabled: true
  reminder:
    # 同一任務兩次提醒的最小間隔(同地點重複進出不重複轟炸)
    debounce-window: 10m
    # 提醒後未確認,多久後升級催促
    escalation-interval: 15m
    # 最多催促次數,之後不再輪
    max-escalations: 3
    # 延遲佇列輪詢間隔
    poll-interval: 5s
  notification:
    windows-toast:
      # 預設關閉;只在本機開發(local profile)打開
      enabled: false
  knowledge:
    # 品項自動綁定時建立的 geofence 半徑
    auto-bind-radius-meters: 200
  feasibility:
    # 直線距離換算交通時間的假設速度(km/h);保守取低,寧可誤報要求確認
    assumed-speed-kmh: 25
    # 每段移動的固定緩衝(出門、停車、等車)
    transfer-buffer: 10m
